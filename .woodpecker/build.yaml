---
variables:
  - &sccache-env
    CARGO_TERM_COLOR: always
    CARGO_INCREMENTAL: "0"  # ← Added! Disables incremental compilation for better caching
    SCCACHE_S3_ENABLE_VIRTUAL_HOST_STYLE: "false"  # ← Changed from "true"
    SCCACHE_S3_SERVER_SIDE_ENCRYPTION: "true"
    RUSTC_WRAPPER: sccache
    SCCACHE_BUCKET:
      from_secret: SCCACHE_S3_BUCKET
    SCCACHE_ENDPOINT:
      from_secret: SCCACHE_S3_ENDPOINT
    SCCACHE_REGION: fra1  # ← Changed from "auto" - DigitalOcean needs explicit region
    SCCACHE_S3_USE_SSL: "true"
    AWS_ACCESS_KEY_ID:
      from_secret: SCCACHE_S3_ACCESS_KEY
    AWS_SECRET_ACCESS_KEY:
      from_secret: SCCACHE_S3_SECRET_KEY
    AWS_EC2_METADATA_DISABLED: "true"
when:
  event: [push, pull_request, cron, manual]
matrix:
  TARGET:
    - x86_64-apple-darwin
    - aarch64-apple-darwin
    - aarch64-pc-windows-gnullvm
    - x86_64-pc-windows-gnu
    - x86_64-unknown-linux-gnu
    - aarch64-unknown-linux-gnu
    - x86_64-unknown-linux-musl
    - aarch64-unknown-linux-musl
steps:
  build:
    image: code.billie.codes/purplebooth/rust-build-env:latest
    environment:
      <<: *sccache-env
      CARGO_TERM_COLOR: always
    commands:
      - rustup default stable
      - rustup target add $TARGET
      - cargo zigbuild --release --target $TARGET
