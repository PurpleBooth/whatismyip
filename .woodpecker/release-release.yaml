---
runs_on: [success]
variables:
  - &sccache-env
    CARGO_TERM_COLOR: always
    CARGO_INCREMENTAL: '0'
    CMAKE_C_COMPILER_LAUNCHER: sccache
    CMAKE_CXX_COMPILER_LAUNCHER: sccache
    SCCACHE_S3_ENABLE_VIRTUAL_HOST_STYLE: 'false'
    SCCACHE_S3_SERVER_SIDE_ENCRYPTION: 'true'
    RUSTC_WRAPPER: sccache
    SCCACHE_BUCKET: uwu-stirring-cod
    SCCACHE_ENDPOINT: https://fra1.digitaloceanspaces.com
    SCCACHE_REGION: fra1
    SCCACHE_S3_USE_SSL: 'true'
    AWS_ACCESS_KEY_ID:
      from_secret: SCCACHE_S3_ACCESS_KEY
    AWS_SECRET_ACCESS_KEY:
      from_secret: SCCACHE_S3_SECRET_KEY
    AWS_EC2_METADATA_DISABLED: 'true'
when:
  event: [tag]
clone:
  git:
    image: woodpeckerci/plugin-git@sha256:e6326a142d9bf08c6cc79cee3b3b26c87c15c999f89fb0b14c98d6031639968a
    settings:
      partial: false
      depth: 0
      tags: true
steps:
  release:
    image: codeberg.org/purplebooth/rust-build-env:main
    environment:
      <<: *sccache-env
    commands:
      - cog changelog --unified --at "$CI_COMMIT_TAG" > RELEASE_NOTES.md
      - sccache --show-stats
  upload-changelog:
    depends_on: [release]
    image: woodpeckerci/plugin-release@sha256:700e6a6ceff25fa97b90d159332f5d060c43737853c77378c312a7e1a9fd11f2
    settings:
      api_key:
        from_secret: CODEBERG_TOKEN
      note: RELEASE_NOTES.md
depends_on: [test, lint, build]
