---
when:
  event: [push, pull_request, cron, manual]
steps:
  cargo-test:
    image: code.billie.codes/purplebooth/rust-build-env:latest
    
    environment:
      CARGO_TERM_COLOR: always
      RUSTC_WRAPPER: sccache
      SCCACHE_SERVER_PORT: sccache:4226
    commands:
      - cargo test
  specdown:
    image: code.billie.codes/purplebooth/rust-build-env:latest
    
    environment:
      CARGO_TERM_COLOR: always
      RUSTC_WRAPPER: sccache
      SCCACHE_SERVER_PORT: sccache:4226
    commands:
      - cargo zigbuild --release
      - specdown run --temporary-workspace-dir --add-path "$(pwd)/target/release"
        ./README.md
  audit:
    image: woodpeckerci/plugin-trivy@sha256:612038a5ca2d46fd34bb22510ce84f5ce9b605f36304e58faca8ff3edac59eed
    commands: [trivy fs .]
services:
  - name: sccache
    image: code.billie.codes/purplebooth/rust-build-env:latest
    commands:
      - sccache
    ports:
      - 4226
    environment:
      SCCACHE_START_SERVER: "1"
      SCCACHE_NO_DAEMON: "1"
      RUSTC_WRAPPER: sccache
      SCCACHE_BUCKET:
        from_secret: SCCACHE_S3_BUCKET
      SCCACHE_ENDPOINT:
        from_secret: SCCACHE_S3_ENDPOINT
      SCCACHE_REGION:
        from_secret: SCCACHE_S3_REGION
      SCCACHE_S3_USE_SSL: "true"
      SCCACHE_S3_KEY_PREFIX: ${CI_REPO}
      AWS_ACCESS_KEY_ID:
        from_secret: SCCACHE_S3_ACCESS_KEY
      AWS_SECRET_ACCESS_KEY:
        from_secret: SCCACHE_S3_SECRET_KEY
      AWS_EC2_METADATA_DISABLED: "true"
      SCCACHE_SERVER_PORT: 0.0.0.0:4226